services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      # Only set root password — bench new-site handles all database/user creation
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./50-server.cnf:/etc/mysql/mariadb.conf.d/50-server.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── ERPNext Backend ─────────────────────────────────────────────────────────

  erpnext:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      REDIS_URL: redis://redis:6379
    volumes:
      - frappe_data:/home/frappe/frappe-bench/sites
    networks:
      - internal
      - web

  # ─── React Frontend ───────────────────────────────────────────────────────────

  react:
    build:
      context: /root/code/frappe-bench-custom-test/erpnext-ecommerce
      dockerfile: /root/docker/nexterp_monolith/Dockerfile.react
      args:
        NEXT_PUBLIC_ERPNEXT_URL: https://erp.l.l0l.in
    restart: unless-stopped
    environment:
      ERPNEXT_URL: http://erpnext:8000
    depends_on:
      - erpnext
    networks:
      - internal
      - web

volumes:
  mariadb_data:
  redis_data:
  frappe_data:

networks:
  internal:             # private network for DB/Redis — not exposed to Caddy
    driver: bridge
  web:
    external: true      # shared with the root docker-compose that runs Caddy
